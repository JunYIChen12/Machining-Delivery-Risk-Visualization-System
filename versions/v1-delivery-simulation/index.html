<!doctype html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>v1 交付齐套模拟</title><style>body{margin:0;background:#eef2f5;color:#15202b;font-family:'Microsoft YaHei',Arial,sans-serif}.wrap{padding:28px;max-width:1180px;margin:auto}.hero{display:flex;justify-content:space-between;gap:20px;align-items:flex-start}.label{color:#16847c;font-weight:800}h1{margin:8px 0 10px;font-size:32px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:22px 0}.card,.panel{background:white;border:1px solid #d8e0e7;border-radius:8px;box-shadow:0 12px 30px rgba(23,42,55,.08)}.card{padding:16px}.card span{color:#657282;font-size:13px}.card strong{display:block;margin-top:8px;font-size:28px}.layout{display:grid;grid-template-columns:1.3fr .8fr;gap:16px}.panel h2{margin:0;padding:16px 18px;border-bottom:1px solid #d8e0e7}.body{padding:18px}.row{display:grid;grid-template-columns:140px 1fr 80px;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid #edf1f4}.bar{height:10px;background:#e7edf1;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:#16847c}.risk{background:#fff0d8;color:#7a4b10;padding:10px;border-radius:8px;margin-bottom:10px;font-weight:700}@media(max-width:860px){.grid,.layout{grid-template-columns:1fr}.hero{display:block}}</style></head>
<body><main class="wrap"><section class="hero"><div><div class="label">v1 DELIVERY SIMULATION</div><h1>交付齐套模拟驾驶舱</h1><p>首版方向：把报工产出转成可用产能池，再模拟订单是否能齐套交付。</p></div><div class="card"><span>版本定位</span><strong>探索版</strong></div></section><section class="grid"><div class="card"><span>可完全齐套订单</span><strong>1/3</strong></div><div class="card"><span>模拟可发套数</span><strong>8</strong></div><div class="card"><span>全局瓶颈</span><strong>基座</strong></div><div class="card"><span>优先工序</span><strong>表面处理</strong></div></section><section class="layout"><div class="panel"><h2>订单齐套模拟</h2><div class="body"><div class="risk">B订单：可齐套 8/8 套，交期最近，模拟优先保交付。</div><div class="risk">A订单：可齐套 0/12 套，产能被临期订单占用后缺口明显。</div><div class="risk">C订单：可齐套 0/6 套，当前不应抢占临期产能。</div></div></div><div class="panel"><h2>半成品产能池</h2><div class="body"><div class="row"><b>销轴</b><div class="bar"><i style="width:100%"></i></div><span>15件</span></div><div class="row"><b>缸体</b><div class="bar"><i style="width:60%"></i></div><span>9件</span></div><div class="row"><b>活塞</b><div class="bar"><i style="width:90%"></i></div><span>13件</span></div><div class="row"><b>压板</b><div class="bar"><i style="width:70%"></i></div><span>10件</span></div><div class="row"><b>基座</b><div class="bar"><i style="width:50%"></i></div><span>8件</span></div></div></div></section></main></body></html>
