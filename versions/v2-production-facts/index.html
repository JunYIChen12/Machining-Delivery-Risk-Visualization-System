<!doctype html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>v2 生产事实可视化</title><style>body{margin:0;background:#eef2f5;color:#15202b;font-family:'Microsoft YaHei',Arial,sans-serif}.shell{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.nav{background:#132832;color:white;padding:22px}.nav h1{font-size:22px}.nav .item{padding:12px;border:1px solid rgba(255,255,255,.14);border-radius:8px;margin:10px 0;background:rgba(255,255,255,.06)}.main{padding:24px}.label{color:#16847c;font-weight:800}h2{font-size:30px;margin:8px 0 10px}.grid{display:grid;grid-template-columns:1.3fr .9fr;gap:16px}.panel{background:white;border:1px solid #d8e0e7;border-radius:8px;box-shadow:0 12px 30px rgba(23,42,55,.08);overflow:hidden}.panel h3{margin:0;padding:16px;border-bottom:1px solid #d8e0e7}.body{padding:16px}.flow{height:330px;position:relative;background:#fbfcfd;border-radius:8px}.node{position:absolute;padding:12px 14px;border:1px solid #d8e0e7;border-radius:8px;background:#dff2ef;font-weight:800}.n1{left:30px;top:60px}.n2{left:250px;top:60px;background:#fff0d8}.n3{left:480px;top:40px}.n4{left:480px;top:130px}.n5{left:480px;top:220px}.pool{display:grid;gap:10px}.pool div{padding:12px;border:1px solid #d8e0e7;border-radius:8px}.small{color:#657282;font-size:13px}.heat{display:grid;grid-template-columns:120px repeat(3,1fr);gap:6px}.cell{padding:10px;border-radius:8px;background:#f3f6f8}.hot{background:#16847c;color:white}.warm{background:#dff2ef}@media(max-width:860px){.shell{display:block}.grid{grid-template-columns:1fr}}</style></head>
<body><div class="shell"><aside class="nav"><h1>v2 生产事实底座</h1><div class="item">订单相关加工进度</div><div class="item">半成品产能池</div><div class="item">工序产出来源</div><p class="small">第一阶段不做自动齐套判断，只展示事实。</p></aside><main class="main"><div class="label">v2 PRODUCTION FACTS</div><h2>把报工流水整理成生产事实画面</h2><section class="grid"><div class="panel"><h3>多订单交叉流转地图</h3><div class="body"><div class="flow"><div class="node n1">销售订单</div><div class="node n2">MES工单</div><div class="node n3">销轴</div><div class="node n4">缸体</div><div class="node n5">基座</div></div></div></div><div class="panel"><h3>半成品产能池</h3><div class="body pool"><div><b>销轴25T</b><br><span class="small">完工15，在制5</span></div><div><b>缸体25T</b><br><span class="small">完工9，在制11</span></div><div><b>基座25T</b><br><span class="small">完工8，在制12</span></div></div></div></section><br><section class="panel"><h3>工序热力图</h3><div class="body heat"><div class="cell">工序</div><div class="cell">销轴</div><div class="cell">缸体</div><div class="cell">基座</div><div class="cell">车床</div><div class="cell hot">20件</div><div class="cell hot">15件</div><div class="cell">无</div><div class="cell">加工中心</div><div class="cell">无</div><div class="cell warm">9件</div><div class="cell warm">7件</div></div></section></main></div></body></html>
